<html lang="en">

    <meta property="og:type" content="website" />

    <!-- Non-blocking font loading with font-display:optional to eliminate CLS from font swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@300;400;500;600;700;800&family=Archivo:wght@400;700;800;900&family=Archivo+Black&family=Bebas+Neue&family=Big+Shoulders:opsz,wght@10..72,100..900&family=Geist+Mono:wght@300;400;500;600;700&display=swap">

  </head>
  <body>
    <!-- Pre-render hidden logo image to consume preload link immediately and avoid console warning -->
    <img src="/png_lelam_1.webp" style="display: none;" alt="" />
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
